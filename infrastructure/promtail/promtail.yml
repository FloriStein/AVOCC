server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: avoc-docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["com.docker.compose.project=avoc"]
    relabel_configs:
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: service
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
    pipeline_stages:
      # Parse JSON logs emitted by pkg/logger (ADR-017)
      - json:
          expressions:
            level:      level
            event_type: event_type
            session_id: session_id
            vehicle_id: vehicle_id
            msg:        msg
      # Promote extracted fields as Loki labels for fast LogQL filtering
      - labels:
          level:
          event_type:
          session_id:
