# coturn STUN/TURN configuration — ADR-014
# Vehicle ↔ Internet ↔ OCC NAT Traversal

listening-port=3478
tls-listening-port=5349
listening-ip=0.0.0.0

# EC2 liegt hinter AWS NAT — coturn muss die öffentliche Elastic IP ankündigen,
# damit TURN-Relay-Adressen von externen Clients (Larix, Browser) erreichbar sind.
# Wird via docker-compose environment gesetzt: TURN_EXTERNAL_IP=3.126.131.56
external-ip=${TURN_EXTERNAL_IP}

# Set via environment variable TURN_REALM in docker-compose
realm=${TURN_REALM}

# Credentials — set via environment variables
user=${TURN_USER}:${TURN_PASSWORD}

# Use fingerprint for WebRTC compatibility
fingerprint

# Allow TURN (relay) in addition to STUN
lt-cred-mech

# Logging
log-file=stdout
verbose

# No CLI in container
no-cli

# Relay-Port-Range muss mit AWS Security Group übereinstimmen (49160-49200 UDP offen)
min-port=49160
max-port=49200
