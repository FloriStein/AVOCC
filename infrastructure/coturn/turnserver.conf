# coturn STUN/TURN configuration — ADR-014
# Vehicle ↔ Internet ↔ OCC NAT Traversal

listening-port=3478
tls-listening-port=5349

# Set via environment variable TURN_REALM in docker-compose
realm=${TURN_REALM}

# Credentials — set via environment variables
user=${TURN_USER}:${TURN_PASSWORD}

# Use fingerprint for WebRTC compatibility
fingerprint

# Allow TURN (relay) in addition to STUN
lt-cred-mech

# Logging
log-file=stdout
verbose

# No CLI in container
no-cli

# Safety: limit relay ports
min-port=49152
max-port=65535
