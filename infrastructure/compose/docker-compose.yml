name: avoc

services:

  # ─── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../..
      dockerfile: infrastructure/docker/frontend.Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - control-server
    networks:
      - avoc-net

  # ─── Control Server (Hub — Safety Truth, Session Manager GSA) ─────────────
  control-server:
    build:
      context: ../..
      dockerfile: infrastructure/docker/go-service.Dockerfile
      args:
        SERVICE_NAME: control-server
    ports:
      - "8080:8080"
    environment:
      CONTROL_PORT: "8080"
      JWT_SECRET: ${JWT_SECRET}
      SAFETY_SERVICE_URL: "http://safety-service:8082"
      SFU_SERVICE_URL: "http://webrtc-sfu:8084"
      AUTH_SERVICE_URL: "http://auth-service:8081"
      AUDIT_DB_PATH: "/data/audit/avoc_audit.db"
      LOG_LEVEL: "info"
      WHIP_STREAM_KEY: ${WHIP_STREAM_KEY:-dev-stream-key-change-in-production}
      MEDIAMTX_API_URL: "http://mediamtx:9997"
    volumes:
      - audit-data:/data/audit
    depends_on:
      - auth-service
      - safety-service
    networks:
      - avoc-net

  # ─── Auth Service ──────────────────────────────────────────────────────────
  auth-service:
    build:
      context: ../..
      dockerfile: infrastructure/docker/go-service.Dockerfile
      args:
        SERVICE_NAME: auth-service
    ports:
      - "8081:8081"
    environment:
      AUTH_PORT: "8081"
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - avoc-net

  # ─── Safety Service (Safety Event Bus) ────────────────────────────────────
  safety-service:
    build:
      context: ../..
      dockerfile: infrastructure/docker/go-service.Dockerfile
      args:
        SERVICE_NAME: safety-service
    ports:
      - "8082:8082"
    environment:
      SAFETY_PORT: "8082"
    networks:
      - avoc-net

  # ─── Telemetry Service (MQTT Bridge — Sprint 4) ────────────────────────────
  telemetry-service:
    build:
      context: ../..
      dockerfile: infrastructure/docker/go-service.Dockerfile
      args:
        SERVICE_NAME: telemetry-service
    ports:
      - "8083:8083"
    environment:
      TELEMETRY_PORT: "8083"
      MQTT_BROKER: "mosquitto:1883"
    depends_on:
      - mosquitto
    networks:
      - avoc-net

  # ─── MQTT Broker ───────────────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ../mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    networks:
      - avoc-net

  # ─── WebRTC SFU (ADR-014) ──────────────────────────────────────────────────
  webrtc-sfu:
    build:
      context: ../..
      dockerfile: infrastructure/docker/go-service.Dockerfile
      args:
        SERVICE_NAME: webrtc-sfu
    ports:
      - "8084:8084"
      - "10000-10050:10000-10050/udp"   # RTP media port range (ADR-014)
    environment:
      SFU_PORT: "8084"
      CONTROL_SERVER_URL: "http://control-server:8080"
    networks:
      - avoc-net

  # ─── MediaMTX — WHIP/WHEP Router (ADR-020) ───────────────────────────────
  mediamtx:
    image: bluenviron/mediamtx:latest
    ports:
      - "8889:8889/tcp"   # WHIP/WHEP Signaling (HTTP)
      - "8889:8889/udp"   # WebRTC ICE Transport
      - "9997:9997"       # Management API
    volumes:
      - ../mediamtx/mediamtx.yml:/mediamtx.yml:ro
    environment:
      TURN_EXTERNAL_IP: ${TURN_EXTERNAL_IP:-127.0.0.1}
      TURN_USER: ${TURN_USER:-avoc}
      TURN_PASSWORD: ${TURN_PASSWORD:-changeme}
    depends_on:
      - control-server
      - stun-turn
    networks:
      - avoc-net

  # ─── STUN/TURN (coturn — ADR-014) ─────────────────────────────────────────
  stun-turn:
    image: coturn/coturn:latest
    ports:
      - "3479:3478/udp"
      - "3479:3478/tcp"
      - "5350:5349/udp"
      - "5350:5349/tcp"
      # TURN relay UDP range — only needed for Vehicle↔Internet↔OCC (not required for local dev)
      # Map specific ports in production as needed
    volumes:
      - ../coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    environment:
      TURN_REALM: ${TURN_REALM:-avoc.local}
      TURN_USER: ${TURN_USER:-avoc}
      TURN_PASSWORD: ${TURN_PASSWORD:-changeme}
    networks:
      - avoc-net

  # ─── Loki — Log Aggregation (ADR-017, LOG-09) ─────────────────────────────
  loki:
    image: grafana/loki:3.0.0
    ports:
      - "3100:3100"
    volumes:
      - ../loki/loki.yml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/config.yaml
    networks:
      - avoc-net

  # ─── Promtail — Docker Log Collector (ADR-017, LOG-09) ────────────────────
  promtail:
    image: grafana/promtail:3.0.0
    volumes:
      - ../promtail/promtail.yml:/etc/promtail/config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yaml
    depends_on:
      - loki
    networks:
      - avoc-net

  # ─── Grafana — Log Visualisation (ADR-017, LOG-09) ────────────────────────
  grafana:
    image: grafana/grafana:11.0.0
    ports:
      - "3001:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - loki
    networks:
      - avoc-net

networks:
  avoc-net:
    driver: bridge

volumes:
  audit-data:   # SQLite audit store — persistent safety event log (ADR-018)
  loki-data:    # Loki log storage — 30d retention (ADR-017)
  grafana-data: # Grafana state (dashboards, alerts)
