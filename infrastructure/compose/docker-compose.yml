name: avoc

services:

  # ─── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../..
      dockerfile: infrastructure/docker/frontend.Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - control-server
    networks:
      - avoc-net

  # ─── Control Server (Hub — Safety Truth, Session Manager GSA) ─────────────
  control-server:
    build:
      context: ../..
      dockerfile: infrastructure/docker/go-service.Dockerfile
      args:
        SERVICE_NAME: control-server
    ports:
      - "8080:8080"
    environment:
      CONTROL_PORT: "8080"
      JWT_SECRET: ${JWT_SECRET}
      SAFETY_SERVICE_URL: "http://safety-service:8082"
      SFU_SERVICE_URL: "http://webrtc-sfu:8084"
      AUTH_SERVICE_URL: "http://auth-service:8081"
      AUDIT_DB_PATH: "/data/audit/avoc_audit.db"
      LOG_LEVEL: "info"
      WHIP_STREAM_KEY: ${WHIP_STREAM_KEY:-dev-stream-key-change-in-production}
      MEDIAMTX_API_URL: "http://host.docker.internal:9997"
      TURN_EXTERNAL_IP: ${TURN_EXTERNAL_IP:-127.0.0.1}
      TURN_PORT: ${TURN_PORT:-3479}
      TURN_USER: ${TURN_USER:-avoc}
      TURN_PASSWORD: ${TURN_PASSWORD:-changeme}
    volumes:
      - audit-data:/data/audit
    extra_hosts:
      - "host.docker.internal:host-gateway"   # Damit MEDIAMTX_API_URL auf mediamtx (host network) zeigt
    depends_on:
      - auth-service
      - safety-service
    networks:
      - avoc-net

  # ─── Auth Service ──────────────────────────────────────────────────────────
  auth-service:
    build:
      context: ../..
      dockerfile: infrastructure/docker/go-service.Dockerfile
      args:
        SERVICE_NAME: auth-service
    ports:
      - "8081:8081"
    environment:
      AUTH_PORT: "8081"
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - avoc-net

  # ─── Safety Service (Safety Event Bus) ────────────────────────────────────
  safety-service:
    build:
      context: ../..
      dockerfile: infrastructure/docker/go-service.Dockerfile
      args:
        SERVICE_NAME: safety-service
    ports:
      - "8082:8082"
    environment:
      SAFETY_PORT: "8082"
    networks:
      - avoc-net

  # ─── Telemetry Service (MQTT Bridge — Sprint 4) ────────────────────────────
  telemetry-service:
    build:
      context: ../..
      dockerfile: infrastructure/docker/go-service.Dockerfile
      args:
        SERVICE_NAME: telemetry-service
    ports:
      - "8083:8083"
    environment:
      TELEMETRY_PORT: "8083"
      MQTT_BROKER: "mosquitto:1883"
    depends_on:
      - mosquitto
    networks:
      - avoc-net

  # ─── MQTT Broker ───────────────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ../mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    networks:
      - avoc-net

  # ─── WebRTC SFU (ADR-014) ──────────────────────────────────────────────────
  webrtc-sfu:
    build:
      context: ../..
      dockerfile: infrastructure/docker/go-service.Dockerfile
      args:
        SERVICE_NAME: webrtc-sfu
    ports:
      - "8084:8084"
      - "10000-10050:10000-10050/udp"   # RTP media port range (ADR-014)
    environment:
      SFU_PORT: "8084"
      CONTROL_SERVER_URL: "http://control-server:8080"
    networks:
      - avoc-net

  # ─── MediaMTX — WHIP/WHEP Router (ADR-020) ───────────────────────────────
  # network_mode: host — MediaMTX läuft direkt im Host-Netzwerk (Linux only).
  # Kein Docker-NAT, kein Hairpin-Problem, WebRTC ICE funktioniert stabil.
  # Ports sind automatisch auf dem Host (8889/tcp, 8189/udp, 9997/tcp).
  mediamtx:
    image: bluenviron/mediamtx:latest
    network_mode: host
    volumes:
      - ../mediamtx/mediamtx.dev.yml:/mediamtx.yml:ro
    depends_on:
      - control-server

  # ─── STUN/TURN (coturn — ADR-014) ─────────────────────────────────────────
  # Command-line args statt Config-File: Docker Compose substituiert ${VAR} direkt,
  # coturn's eigener Config-Parser löst ${VAR} nicht auf.
  stun-turn:
    image: coturn/coturn:latest
    ports:
      - "3479:3478/udp"
      - "3479:3478/tcp"
      - "49152-49400:49152-49400/udp"   # TURN relay range (249 ports)
    command: >
      --listening-port=3478
      --external-ip=${TURN_EXTERNAL_IP:-127.0.0.1}
      --realm=${TURN_REALM:-avoc.local}
      --user=${TURN_USER:-avoc}:${TURN_PASSWORD:-changeme}
      --min-port=49152
      --max-port=49400
      --fingerprint
      --lt-cred-mech
      --no-cli
      --log-file=stdout
    networks:
      - avoc-net

  # ─── Loki — Log Aggregation (ADR-017, LOG-09) ─────────────────────────────
  loki:
    image: grafana/loki:3.0.0
    ports:
      - "3100:3100"
    volumes:
      - ../loki/loki.yml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/config.yaml
    networks:
      - avoc-net

  # ─── Promtail — Docker Log Collector (ADR-017, LOG-09) ────────────────────
  promtail:
    image: grafana/promtail:3.0.0
    volumes:
      - ../promtail/promtail.yml:/etc/promtail/config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yaml
    depends_on:
      - loki
    networks:
      - avoc-net

  # ─── Grafana — Log Visualisation (ADR-017, LOG-09) ────────────────────────
  grafana:
    image: grafana/grafana:11.0.0
    ports:
      - "3001:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - loki
    networks:
      - avoc-net

  # ─── Vehicle Mock — simuliert Raspberry Pi (ADR-021) ──────────────────────
  # Implementiert dieselbe Schnittstelle wie ein reales Fahrzeug:
  # WS-Connect auf /vehicle/ws, ControlCommand decode, ACK senden, MQTT Telemetrie.
  vehicle-mock:
    build:
      context: ../..
      dockerfile: infrastructure/docker/vehicle-mock.Dockerfile
    environment:
      VEHICLE_ID: "vehicle-001"
      CONTROL_SERVER_URL: "ws://control-server:8080/vehicle/ws"
      JWT_SECRET: ${JWT_SECRET}
      MQTT_BROKER: "mosquitto:1883"
    depends_on:
      - control-server
      - mosquitto
    networks:
      - avoc-net
    restart: unless-stopped

networks:
  avoc-net:
    driver: bridge

volumes:
  audit-data:   # SQLite audit store — persistent safety event log (ADR-018)
  loki-data:    # Loki log storage — 30d retention (ADR-017)
  grafana-data: # Grafana state (dashboards, alerts)
