name: avoc

# Production Compose — EC2 Deployment (ADR-019)
# Verwendet pre-built Images aus Docker Hub. Kein build: auf der Instanz.
# Secrets kommen als Shell-Env-Variablen von scripts/deploy.sh (aus AWS SSM).
#
# Starten: bash scripts/deploy.sh
# Manuell: AWS_REGION=... VERSION=latest bash scripts/deploy.sh

services:

  # ─── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    image: ${REGISTRY}/avoc-frontend:${VERSION}
    ports:
      - "3000:80"
    depends_on:
      - control-server
    networks:
      - avoc-net
    restart: unless-stopped

  # ─── Control Server ────────────────────────────────────────────────────────
  control-server:
    image: ${REGISTRY}/avoc-control-server:${VERSION}
    ports:
      - "8080:8080"
    environment:
      CONTROL_PORT: "8080"
      JWT_SECRET: ${JWT_SECRET}
      SAFETY_SERVICE_URL: "http://safety-service:8082"
      SFU_SERVICE_URL: "http://webrtc-sfu:8084"
      AUTH_SERVICE_URL: "http://auth-service:8081"
      AUDIT_DB_PATH: "/data/audit/avoc_audit.db"
      LOG_LEVEL: "info"
    volumes:
      - audit-data:/data/audit
    depends_on:
      - auth-service
      - safety-service
    networks:
      - avoc-net
    restart: unless-stopped

  # ─── Auth Service ──────────────────────────────────────────────────────────
  auth-service:
    image: ${REGISTRY}/avoc-auth-service:${VERSION}
    ports:
      - "8081:8081"
    environment:
      AUTH_PORT: "8081"
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - avoc-net
    restart: unless-stopped

  # ─── Safety Service ────────────────────────────────────────────────────────
  safety-service:
    image: ${REGISTRY}/avoc-safety-service:${VERSION}
    ports:
      - "8082:8082"
    environment:
      SAFETY_PORT: "8082"
    networks:
      - avoc-net
    restart: unless-stopped

  # ─── Telemetry Service ─────────────────────────────────────────────────────
  telemetry-service:
    image: ${REGISTRY}/avoc-telemetry-service:${VERSION}
    ports:
      - "8083:8083"
    environment:
      TELEMETRY_PORT: "8083"
      MQTT_BROKER: "mosquitto:1883"
    depends_on:
      - mosquitto
    networks:
      - avoc-net
    restart: unless-stopped

  # ─── MQTT Broker ───────────────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    networks:
      - avoc-net
    restart: unless-stopped

  # ─── WebRTC SFU ────────────────────────────────────────────────────────────
  webrtc-sfu:
    image: ${REGISTRY}/avoc-webrtc-sfu:${VERSION}
    ports:
      - "8084:8084"
      - "10000-10050:10000-10050/udp"
    environment:
      SFU_PORT: "8084"
      CONTROL_SERVER_URL: "http://control-server:8080"
    networks:
      - avoc-net
    restart: unless-stopped

  # ─── coturn STUN/TURN (ADR-014, DEPLOY-05) ────────────────────────────────
  # external-ip wird als Command-Flag übergeben — coturn kennt damit seine
  # öffentliche Elastic IP und kann TURN relay korrekt ankündigen.
  # Port-Range auf 49160-49200 begrenzt (entspricht Security Group, CDK).
  stun-turn:
    image: coturn/coturn:latest
    command: >
      --external-ip=${TURN_EXTERNAL_IP}
      --realm=${TURN_REALM}
      --user=${TURN_USER}:${TURN_PASSWORD}
      --listening-port=3478
      --fingerprint
      --lt-cred-mech
      --no-cli
      --log-file=stdout
      --verbose
      --min-port=49160
      --max-port=49200
    ports:
      - "3479:3478/udp"
      - "3479:3478/tcp"
      - "49160-49200:49160-49200/udp"
    networks:
      - avoc-net
    restart: unless-stopped

  # ─── Loki ──────────────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.0.0
    ports:
      - "3100:3100"
    volumes:
      - ../loki/loki.yml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/config.yaml
    networks:
      - avoc-net
    restart: unless-stopped

  # ─── Promtail ──────────────────────────────────────────────────────────────
  promtail:
    image: grafana/promtail:3.0.0
    volumes:
      - ../promtail/promtail.yml:/etc/promtail/config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yaml
    depends_on:
      - loki
    networks:
      - avoc-net
    restart: unless-stopped

  # ─── Grafana (DEPLOY-06 — kein Anonymous Admin auf EC2) ───────────────────
  grafana:
    image: grafana/grafana:11.0.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
    volumes:
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - loki
    networks:
      - avoc-net
    restart: unless-stopped

networks:
  avoc-net:
    driver: bridge

volumes:
  audit-data:
  loki-data:
  grafana-data:
