server {
    listen 80;
    listen 443 ssl;

    # Self-signed cert — erzeugt von deploy.sh (openssl), liegt im ssl/ Volume.
    # Browser zeigt Sicherheitswarnung → einmalig akzeptieren → getUserMedia funktioniert.
    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;

    root /usr/share/nginx/html;
    index index.html;

    # Docker's internal DNS — forces dynamic re-resolution per TTL instead of caching at startup.
    # Variable-based proxy_pass is required for the resolver to take effect.
    # NOTE: set $var must come BEFORE rewrite...break — rewrite module stops processing all
    #       subsequent rewrite-phase directives (including set) when break is used.
    resolver 127.0.0.11 valid=5s ipv6=off;

    # Proxy REST API to control server — /api/ prefix is stripped before forwarding
    location /api/ {
        set $upstream_cs http://control-server:8080;
        rewrite ^/api/(.*) /$1 break;
        proxy_pass $upstream_cs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy auth endpoints — /auth/ prefix is kept (auth service owns /auth/* routes)
    location /auth/ {
        set $upstream_auth http://auth-service:8081;
        proxy_pass $upstream_auth;
        proxy_set_header Host $host;
    }

    # Operator WebSocket
    location /ws {
        set $upstream_ws http://control-server:8080;
        proxy_pass $upstream_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600;
    }

    # Vehicle WebSocket
    location /vehicle/ws {
        set $upstream_vws http://control-server:8080;
        proxy_pass $upstream_vws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600;
    }

    # WebRTC SFU signaling — /sfu/ prefix is stripped (ADR-014)
    location /sfu/ {
        set $upstream_sfu http://webrtc-sfu:8084;
        rewrite ^/sfu/(.*) /$1 break;
        proxy_pass $upstream_sfu;
        proxy_set_header Host $host;
    }

    # WHIP — Browser publiziert Stream an MediaMTX (Testing/Dev, ohne Larix)
    # /whip/vehicle-001/whip → http://mediamtx:8889/vehicle-001/whip
    # Authorization-Header wird durchgereicht (Stream-Key-Validierung via MediaMTX auth hook)
    location /whip/ {
        set $upstream_mtx http://mediamtx:8889;
        rewrite ^/whip/(.*) /$1 break;
        proxy_pass $upstream_mtx;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # WHEP — Operator Browser subscribed an MediaMTX Stream (ADR-020)
    # /whep/vehicle-001/whep → http://mediamtx:8889/vehicle-001/whep
    # Authorization-Header wird durchgereicht (JWT-Validierung via MediaMTX auth hook)
    location /whep/ {
        set $upstream_mtx http://mediamtx:8889;
        rewrite ^/whep/(.*) /$1 break;
        proxy_pass $upstream_mtx;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # Telemetry queries — /telemetry/ prefix is kept (telemetry service owns /telemetry/* routes)
    location /telemetry/ {
        set $upstream_tel http://telemetry-service:8083;
        proxy_pass $upstream_tel;
        proxy_set_header Host $host;
    }

    # SPA fallback — must be last
    location / {
        try_files $uri $uri/ /index.html;
    }
}
