server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy REST API to control server (strips /api/ prefix)
    location /api/ {
        proxy_pass http://control-server:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy auth endpoints to auth service (keeps /auth/ prefix)
    location /auth/ {
        proxy_pass http://auth-service:8081/auth/;
        proxy_set_header Host $host;
    }

    # Proxy operator WebSocket to control server
    location /ws {
        proxy_pass http://control-server:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600;
    }

    # Proxy vehicle WebSocket to control server
    location /vehicle/ws {
        proxy_pass http://control-server:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600;
    }

    # SPA fallback — must be last
    location / {
        try_files $uri $uri/ /index.html;
    }
}
